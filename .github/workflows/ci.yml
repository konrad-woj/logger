name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: ruff format
        run: uv run ruff format --check .

      - name: ruff check
        run: uv run ruff check .

      - name: pyright
        run: uvx pyright .

      - name: uv.lock up-to-date
        run: uv lock --check
